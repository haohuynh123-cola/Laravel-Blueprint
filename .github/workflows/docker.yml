name: Docker image

# Triggers AFTER the Release workflow has attached blueprint.phar to the
# GH Release (otherwise the docker build can't fetch the phar). Two paths:
#  - Release workflow completes successfully → this fires automatically
#  - Manual via workflow_dispatch with explicit tag
on:
  workflow_run:
    workflows: ['Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.5.0)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            # workflow_run fires off the Release workflow which itself was
            # triggered by a tag push — head_branch is the tag name.
            TAG="$HEAD_BRANCH"
          fi
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Tag '$TAG' is not a release tag — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          # Strip leading v for image tag suffix.
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.tag.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.tag.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.tag.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.tag.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PHAR_VERSION=${{ steps.tag.outputs.name }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/laravel-blueprint:latest
            ghcr.io/${{ github.repository_owner }}/laravel-blueprint:${{ steps.tag.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.tag.outputs.name }}
            org.opencontainers.image.licenses=MIT
