name: Update Homebrew tap

# Fires after the Release workflow attaches blueprint.phar — we need that asset
# to compute its sha256 for the formula.
on:
  workflow_run:
    workflows: ['Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.5.0)'
        required: true

permissions:
  contents: read

jobs:
  bump-formula:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$HEAD_BRANCH"
          fi
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Tag '$TAG' is not a release tag — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.tag.outputs.skip != 'true'

      - name: Compute phar sha256
        id: sha
        if: steps.tag.outputs.skip != 'true'
        run: |
          URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.name }}/blueprint.phar"
          echo "Downloading $URL"
          curl -fsSL -o /tmp/blueprint.phar "$URL"
          SHA="$(sha256sum /tmp/blueprint.phar | awk '{print $1}')"
          echo "value=$SHA" >> "$GITHUB_OUTPUT"

      - name: Render formula
        if: steps.tag.outputs.skip != 'true'
        run: |
          mkdir -p out/Formula
          sed \
            -e "s|__VERSION__|${{ steps.tag.outputs.name }}|g" \
            -e "s|__VERSION_NO_V__|${{ steps.tag.outputs.version }}|g" \
            -e "s|__SHA256__|${{ steps.sha.outputs.value }}|g" \
            homebrew/Formula/laravel-blueprint.rb > out/Formula/laravel-blueprint.rb
          echo "--- Rendered formula ---"
          cat out/Formula/laravel-blueprint.rb

      - name: Push to tap repo
        if: steps.tag.outputs.skip != 'true'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPO: ${{ github.repository_owner }}/homebrew-laravel-blueprint
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret is not set — skipping push. See homebrew/README.md."
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cp out/Formula/laravel-blueprint.rb tap/Formula/laravel-blueprint.rb

          cd tap
          if git diff --quiet; then
            echo "Formula already up to date."
            exit 0
          fi

          git add Formula/laravel-blueprint.rb
          git commit -m "chore: bump laravel-blueprint to ${TAG}"
          git push
