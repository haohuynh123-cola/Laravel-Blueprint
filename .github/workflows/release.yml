name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.4.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so release notes can diff against the previous tag.
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect prerelease
        id: prerelease
        run: |
          tag="${{ steps.tag.outputs.name }}"
          if echo "$tag" | grep -Eq '-(alpha|beta|rc)'; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          ini-values: phar.readonly=Off
          coverage: none

      - name: Install runtime dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress

      - name: Download box
        run: |
          curl -fsSL -o box.phar https://github.com/box-project/box/releases/latest/download/box.phar
          chmod +x box.phar

      - name: Build phar
        run: php -d phar.readonly=Off box.phar compile --no-parallel

      - name: Verify phar runs
        run: php blueprint.phar --version

      - name: Create GitHub Release with phar attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          prerelease_flag=""
          if [ "${{ steps.prerelease.outputs.value }}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            $prerelease_flag \
            blueprint.phar
